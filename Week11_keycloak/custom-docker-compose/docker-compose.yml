services:
  ownerservice-postgres:
    image: postgres:16
    container_name: ownerservice-postgres
    environment:
      POSTGRES_DB: ownerservice
      POSTGRES_USER: ownerservice
      POSTGRES_PASSWORD: ownerservice
      TZ: Asia/Phnom_Penh
    ports:
      - "5445:5432"
    networks:
      - postgres
    volumes:
      - ownerservice_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ownerservice -d ownerservice"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_ownerservice
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    networks:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      ownerservice-postgres:
        condition: service_healthy
      keycloak-postgres:
        condition: service_healthy
    restart: unless-stopped

  keycloak-postgres:
    image: postgres:16-alpine
    container_name: keycloak-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      TZ: Asia/Phnom_Penh
    ports:
      - "5446:5432"
    networks:
      - postgres
    volumes:
      - keycloak_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak

      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "9090:8080"
    networks:
      - postgres
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  postgres:
    driver: bridge

volumes:
  ownerservice_pg_data:
  pgadmin_data:
  keycloak_pg_data: