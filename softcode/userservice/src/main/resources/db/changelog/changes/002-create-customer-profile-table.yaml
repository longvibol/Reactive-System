databaseChangeLog:

  - changeSet:
      id: 002-create-customer-profile-table
      author: chaywang

      changes:

        - createTable:
            tableName: customer_profile

            columns:

              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()

                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_account_id
                  type: uuid

                  constraints:
                    nullable: false

              - column:
                  name: full_name
                  type: varchar(150)

                  constraints:
                    nullable: false

              - column:
                  name: date_of_birth
                  type: date

                  constraints:
                    nullable: false

              - column:
                  name: gender
                  type: varchar(20)

                  constraints:
                    nullable: false

              - column:
                  name: email
                  type: varchar(150)

              - column:
                  name: nid
                  type: varchar(50)

              - column:
                  name: referral_code
                  type: varchar(50)

              - column:
                  name: photo_object_key
                  type: varchar(500)

              - column:
                  name: created_at
                  type: timestamptz

                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamptz

                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: customer_profile
            baseColumnNames: user_account_id
            referencedTableName: user_account
            referencedColumnNames: id
            constraintName: fk_customer_profile_user_account

        - addUniqueConstraint:
            tableName: customer_profile
            columnNames: user_account_id
            constraintName: uk_customer_profile_user_account